name: Deploy site to GitHub Pages

# Publishes the static lab in web/ to GitHub Pages via the first-party Pages
# Actions (upload-pages-artifact + deploy-pages). This replaces the implicit
# "deploy from a branch" (gh-pages) builder, whose server-side deploy step flaked
# intermittently with no re-run control. Here the build and deploy are explicit,
# retryable from the Actions tab, and serialized by a concurrency group.

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

# Least privilege: only what the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish (avoids half-published state).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Stamp build id (cache-busting)
        # Replace the __BUILD__ placeholder in the version-sensitive URLs with the
        # commit SHA so every changed deploy serves fresh ?v= URLs, defeating the
        # browser/edge 10-min cache without a manual hard refresh. $GITHUB_SHA is
        # 40 hex chars (no injection surface); we use its short form.
        run: |
          BUILD="${GITHUB_SHA:0:7}"
          echo "Stamping build id: $BUILD"
          grep -rlZ '__BUILD__' web | xargs -0 -r sed -i "s/__BUILD__/${BUILD}/g"
          echo "Remaining __BUILD__ placeholders (expect 0): $(grep -rc '__BUILD__' web | grep -v ':0$' | wc -l)"
      - name: Upload site artifact (web/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
